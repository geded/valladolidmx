name: I1 Operational Evidence

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: i1-operational-evidence-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

env:
  PRODUCT_SHA: 21ac5ddd7e4caafe1fa916ee7962acc2e2204339
  PLAYWRIGHT_VERSION: 1.55.0

jobs:
  i1-evidence:
    if: github.head_ref == 'agent/i1-skip-link-focus' || github.ref == 'refs/heads/agent/i1-skip-link-focus'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout governed harness
        uses: actions/checkout@v4
        with:
          path: harness
          fetch-depth: 0

      - name: Checkout exact approved product SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ env.PRODUCT_SHA }}
          path: product
          fetch-depth: 1

      - name: Verify immutable product identity
        working-directory: product
        run: |
          test "$(git rev-parse HEAD)" = "$PRODUCT_SHA"
          test -z "$(git status --short)"
          test "$(grep -Fc 'tabIndex={-1}' src/components/discovery/PublicShell.tsx)" -eq 2
          grep -F 'role="note"' src/components/alux/AluxContextChip.tsx
          ! grep -qi playwright package.json
          ! grep -qi playwright bun.lock

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install exact Playwright only in runner temp
        run: |
          mkdir -p "$RUNNER_TEMP/i1-playwright"
          cd "$RUNNER_TEMP/i1-playwright"
          bun init -y
          bun add --exact "@playwright/test@$PLAYWRIGHT_VERSION"
          bunx playwright install --with-deps chromium
          git -C "$GITHUB_WORKSPACE/harness" diff --exit-code -- package.json bun.lock
          git -C "$GITHUB_WORKSPACE/product" diff --exit-code

      - name: Execute I1 browser evidence
        env:
          PLAYWRIGHT_MODULE: ${{ runner.temp }}/i1-playwright/node_modules/playwright/index.mjs
          I1_PRODUCT_DIR: ${{ github.workspace }}/product
          I1_EVIDENCE_DIR: ${{ github.workspace }}/i1-evidence
        run: bun harness/scripts/omxds/i1/operational-evidence.mjs

      - name: Assert no persistent dependency drift
        run: |
          git -C harness diff --exit-code -- package.json bun.lock
          git -C product diff --exit-code

      - name: Upload I1 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i1-operational-evidence-${{ env.PRODUCT_SHA }}
          path: i1-evidence
          if-no-files-found: error
          retention-days: 30
