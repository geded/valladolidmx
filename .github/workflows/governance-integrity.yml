name: Governance Integrity

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  governance-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Check canonical admission and generated projections
        run: bun scripts/governance/sync-governance.mjs --check

      - name: Validate dependency map and knowledge graph
        run: bun scripts/governance/validate-dependency-map.mjs && bun scripts/governance/validate-knowledge-graph.mjs

      - name: Validate inventory and PR freshness
        if: github.event_name == 'pull_request'
        run: bun scripts/governance/validate-governance-integrity.mjs --base=${{ github.event.pull_request.base.sha }}

      - name: Enforce product change authorization
        if: github.event_name == 'pull_request'
        run: bun scripts/governance/validate-product-authorization.mjs --base=${{ github.event.pull_request.base.sha }}

      - name: Validate inventory on main
        if: github.event_name == 'push'
        run: bun scripts/governance/validate-governance-integrity.mjs

      - name: Validate product authorization manifests on main
        if: github.event_name == 'push'
        run: bun scripts/governance/validate-product-authorization.mjs
